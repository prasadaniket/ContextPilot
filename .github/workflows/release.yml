name: Release Extension ZIP

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Package extension
        run: |
          zip -r context-pilot-${{ steps.version.outputs.VERSION }}.zip \
            manifest.json \
            dist/ \
            vendor/ \
            popup/ \
            icons/ \
            --exclude "*.md" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "node_modules/*" \
            --exclude "src/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: context-pilot-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
          body: |
            ## Install in 3 steps (no terminal needed)

            1. Download `context-pilot-${{ steps.version.outputs.VERSION }}.zip` below
            2. Go to `chrome://extensions` → enable **Developer mode** (top right)
            3. **Drag and drop** the zip file onto that page

            Done. No git clone, no npm, no terminal.

            See the [README](https://github.com/${{ github.repository }}#readme) for full setup.
