<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContextPilot</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <h1>ContextPilot</h1>
    <p>v0.1.0</p>
  </header>

  <section class="panel">
    <h2>Live Usage</h2>
    <div class="stats-grid">
      <article class="card">
        <h3>Session Usage</h3>
        <p id="sessionUsage">--%</p>
      </article>
      <article class="card">
        <h3>Weekly Usage</h3>
        <p id="weeklyUsage">--%</p>
      </article>
      <article class="card">
        <h3>Cache Timer</h3>
        <p id="cacheTimer">--</p>
      </article>
      <article class="card">
        <h3>Live Tokens</h3>
        <p id="liveTokens">0</p>
      </article>
    </div>
  </section>

  <section class="panel">
    <h2>Compression Savings</h2>
    <div class="stats-grid">
      <article class="card">
        <h3>Tokens Saved</h3>
        <p id="tokensSaved">0</p>
      </article>
      <article class="card">
        <h3>Nodes Stored</h3>
        <p id="nodesStored">0</p>
      </article>
      <article class="card">
        <h3>Conversations</h3>
        <p id="conversations">0</p>
      </article>
      <article class="card">
        <h3>Compression</h3>
        <p id="compressionRatio">0%</p>
      </article>
    </div>
  </section>

  <section class="settings panel">
    <h2>Settings</h2>
    <label for="apiKeyInput">Anthropic API Key</label>
    <input id="apiKeyInput" type="password" placeholder="sk-ant-..." autocomplete="off">
    <div class="actions">
      <button id="saveApiKeyBtn">Save</button>
      <button id="clearAllBtn" class="danger">Clear all data</button>
    </div>
    <p id="statusText"></p>
  </section>

  <script src="popup.js"></script>
</body>
</html>
